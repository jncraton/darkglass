[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "college-agent"
version = "0.1.0"
description = "Embeddable chatbot for small Christian institutions"
readme = "readme.md"
authors = [{name = ""}]
license = {text = "MIT"}
dependencies = [
    "fastapi==0.135.1",
]

[tool.hatch.build.targets.wheel]
packages = ["pillar-path"]

[tool.hatch.envs.default]
dependencies = [
    "fastapi==0.135.1",
]
