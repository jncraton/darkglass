<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chat Log</title>
    <style>
      /* reuse the color palette and basic layout from the public index */
      body {
        margin: 0;
        font-family: sans-serif;
        color: #333;
      }
      header {
        background: #000;
        color: #fff;
        padding: 1rem;
        text-align: center;
      }
      .content {
        padding: 2rem;
        max-width: 800px;
        margin: auto;
      }
      nav {
        background: #f4f4f4;
        padding: 1rem;
        text-align: center;
      }
      nav a {
        margin: 0 1rem;
        text-decoration: none;
        color: #d35400;
        font-weight: bold;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      table th,
      table td {
        border: 1px solid #ddd;
        padding: 0.5rem;
      }
      table th {
        background: #f4f4f4;
      }
      #message {
        margin: 1rem 0;
        color: #d35400;
        font-weight: bold;
      }
      button {
        background: #000;
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Chat Log</h1>
    </header>
    <main class="content">
      <div id="message"></div>
      <div id="signin-container"></div>
      <div id="signout-container" style="display: none">
        <button id="signout">Sign out</button>
      </div>
      <table id="logs" style="display: none">
        <thead>
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Assistant</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      function showMessage(text) {
        var msg = document.getElementById('message')
        msg.textContent = text
      }

      function renderLogs(token) {
        fetch('/logs', {
          headers: {Authorization: 'Bearer ' + token},
        })
          .then((r) => {
            if (r.status === 401) {
              showMessage('You are logged in but not authorized to view logs')
              throw new Error('unauthorized')
            }
            if (!r.ok) throw new Error('failed to fetch logs')
            return r.json()
          })
          .then((data) => {
            document.getElementById('logs').style.display = ''
            var tbody = document.querySelector('#logs tbody')
            data.forEach(function (row) {
              var tr = document.createElement('tr')
              var d = new Date(row.ts * 1000).toLocaleString()
              tr.innerHTML =
                '<td>' +
                d +
                '</td><td>' +
                row.user_message +
                '</td><td>' +
                row.assistant_message +
                '</td>'
              tbody.appendChild(tr)
            })
          })
          .catch((e) => {
            console.error('failed to load logs', e)
          })
      }

      function handleCredentialResponse(response) {
        document.getElementById('signin-container').style.display = 'none'
        document.getElementById('signout-container').style.display = ''
        showMessage('')
        renderLogs(response.credential)
      }

      window.onload = function () {
        google.accounts.id.initialize({
          client_id: '__GOOGLE_CLIENT_ID__',
          callback: handleCredentialResponse,
        })
        google.accounts.id.renderButton(
          document.getElementById('signin-container'),
          {theme: 'outline', size: 'large'}
        )
        document.getElementById('signout').addEventListener('click', () => {
          google.accounts.id.disableAutoSelect()
          location.reload()
        })
      }
    </script>
  </body>
</html>
